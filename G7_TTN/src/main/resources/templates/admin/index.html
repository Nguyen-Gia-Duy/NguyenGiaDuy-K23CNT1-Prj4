<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | G7 Fashion</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: #f5f6fa;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #111;
            color: #fff;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: #ccc;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #222;
            color: #fff;
        }

        .sidebar .active {
            background: #0d6efd;
            color: #fff;
        }

        /* CONTENT */
        .content {
            margin-left: 240px;
            padding: 30px;
        }

        .card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .topbar {
            background: #fff;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center mb-4">⚙ ADMIN</h4>

    <a href="/admin" class="active">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <a href="/admin/products">
        <i class="bi bi-box"></i> Sản phẩm
    </a>

    <a href="/admin/categories">
        <i class="bi bi-tags"></i> Danh mục
    </a>

    <a href="/admin/orders">
        <i class="bi bi-receipt"></i> Đơn hàng
    </a>

    <a href="/user">
        <i class="bi bi-house"></i> Trang user
    </a>

    <hr>

    <a href="/logout" class="text-danger">
        <i class="bi bi-box-arrow-right"></i> Đăng xuất
    </a>
</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOPBAR -->
    <div class="topbar d-flex justify-content-between align-items-center">

        <h5>Dashboard</h5>

        <div>
            👋 Xin chào,
            <b sec:authentication="name"></b>
        </div>

    </div>

    <!-- STATS -->
    <div class="row">

        <div class="col-md-3 mb-4">
            <div class="card p-3 text-center">
                <h4 th:text="${totalProducts}">0</h4>
                <p>Tổng sản phẩm</p>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card p-3 text-center">
                <h4 th:text="${#lists.size(categories)}">0</h4>
                <p>Danh mục</p>
            </div>
        </div>

        <!-- FIX ĐƠN HÀNG -->
        <div class="col-md-3 mb-4">
            <div class="card p-3 text-center">

                <h4 th:text="${totalOrders != null ? totalOrders : 0}">
                    0
                </h4>

                <p>Đơn hàng</p>

            </div>
        </div>

        <!-- FIX DOANH THU -->
        <div class="col-md-3 mb-4">
            <div class="card p-3 text-center">

                <h4 th:text="${totalRevenue != null ? totalRevenue : 0}">
                    0
                </h4>

                <p>Doanh thu</p>

            </div>
        </div>

    </div>

    <!-- QUICK ACTION -->
    <div class="mt-4">

        <a href="/admin/products"
           class="btn btn-dark">

            📦 Quản lý sản phẩm

        </a>

        <!-- FIX LINK -->
        <a href="/admin/products/create"
           class="btn btn-success">

            ➕ Thêm sản phẩm

        </a>

    </div>

</div>

</body>
</html>
