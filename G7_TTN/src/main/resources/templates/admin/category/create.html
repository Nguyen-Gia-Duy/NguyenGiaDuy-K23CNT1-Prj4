<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Thêm danh mục
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f5f6fa;
        }

        .form-box{
            max-width:800px;
            margin:50px auto;

            background:#fff;
            padding:35px;

            border-radius:22px;

            box-shadow:0 5px 20px rgba(0,0,0,0.05);
        }

    </style>

</head>

<body>

<div class="container">

    <div class="form-box">

        <h3 class="mb-4">
            Thêm danh mục
        </h3>

        <form th:action="@{/admin/category/save}"
              th:object="${category}"
              method="post">

            <!-- NAME -->

            <div class="mb-3">

                <label class="form-label">
                    Tên danh mục
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{name}"
                       required>

            </div>

            <!-- SLUG -->

            <div class="mb-3">

                <label class="form-label">
                    Slug
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{slug}">

            </div>

            <!-- PARENT -->

            <div class="mb-3">

                <label class="form-label">
                    Danh mục cha
                </label>

                <select class="form-select"
                        th:field="*{parent}">

                    <option value="">
                        Không có
                    </option>

                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}">
                    </option>

                </select>

            </div>

            <!-- STATUS -->

            <div class="mb-4">

                <label class="form-label">
                    Trạng thái
                </label>

                <select class="form-select"
                        th:field="*{isactive}">

                    <option value="1">
                        Hiển thị
                    </option>

                    <option value="0">
                        Ẩn
                    </option>

                </select>

            </div>

            <!-- BUTTON -->

            <button class="btn btn-dark">

                Lưu danh mục

            </button>

            <a href="/admin/category"
               class="btn btn-secondary">

                Quay lại

            </a>

        </form>

    </div>

</div>

</body>
</html>
