<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Chi tiết đơn hàng | G7 Admin
    </title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- ICON -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#f5f6fa;
            color:#222;
        }

        a{
            text-decoration:none;
        }

        /* ================= CONTAINER ================= */

        .page-wrapper{
            max-width:1400px;
            margin:auto;
            padding:40px 20px;
        }

        /* ================= HEADER ================= */

        .header-box{
            background:#fff;
            border-radius:24px;
            padding:30px;
            box-shadow:0 5px 25px rgba(0,0,0,0.06);
            margin-bottom:25px;
        }

        .order-title{
            font-size:32px;
            font-weight:700;
            margin-bottom:10px;
        }

        .customer-info{
            color:#777;
            line-height:1.8;
        }

        .status-current{
            display:inline-block;
            padding:10px 20px;
            border-radius:50px;
            font-size:14px;
            font-weight:600;
        }

        .pending{
            background:#fff3cd;
            color:#856404;
        }

        .confirmed{
            background:#cff4fc;
            color:#055160;
        }

        .shipping{
            background:#cfe2ff;
            color:#084298;
        }

        .completed{
            background:#d1e7dd;
            color:#0f5132;
        }

        .cancelled{
            background:#f8d7da;
            color:#842029;
        }

        /* ================= CARD ================= */

        .content-card{
            background:#fff;
            border-radius:24px;
            padding:30px;
            box-shadow:0 5px 25px rgba(0,0,0,0.06);
            margin-bottom:25px;
        }

        .card-title{
            font-size:24px;
            font-weight:700;
            margin-bottom:25px;
        }

        /* ================= BUTTON ================= */

        .status-btn{
            border:none;
            padding:13px 22px;
            border-radius:50px;
            color:#fff;
            font-weight:600;
            transition:0.3s;
        }

        .status-btn:hover{
            transform:translateY(-2px);
            opacity:0.9;
        }

        .btn-confirm{
            background:#0dcaf0;
        }

        .btn-shipping{
            background:#0d6efd;
        }

        .btn-completed{
            background:#198754;
        }

        .btn-cancel{
            background:#dc3545;
        }

        /* ================= TABLE ================= */

        .table{
            margin:0;
        }

        .table thead th{
            background:#f8f9fa;
            border:none;
            padding:18px;
            font-size:14px;
            color:#666;
        }

        .table tbody td{
            padding:18px;
            vertical-align:middle;
        }

        .product-img{
            width:75px;
            height:75px;
            object-fit:cover;
            border-radius:14px;
            border:1px solid #eee;
        }

        .product-name{
            font-weight:600;
            margin-bottom:4px;
        }

        .product-brand{
            font-size:13px;
            color:#888;
        }

        .badge-custom{
            padding:8px 14px;
            border-radius:50px;
            font-size:13px;
            font-weight:600;
        }

        .badge-size{
            background:#111;
            color:#fff;
        }

        .badge-color{
            background:#6c757d;
            color:#fff;
        }

        .price{
            color:#dc3545;
            font-weight:700;
        }

        .total-price{
            color:#198754;
            font-weight:700;
        }

        /* ================= TIMELINE ================= */

        .timeline{
            position:relative;
            margin-left:10px;
        }

        .timeline-item{
            position:relative;
            padding-left:30px;
            padding-bottom:30px;
            border-left:3px solid #0d6efd;
        }

        .timeline-item:last-child{
            border-left:none;
        }

        .timeline-dot{
            width:14px;
            height:14px;
            border-radius:50%;
            background:#0d6efd;
            position:absolute;
            left:-8px;
            top:4px;
        }

        .timeline-status{
            font-weight:700;
            margin-bottom:5px;
        }

        .timeline-time{
            color:#888;
            font-size:13px;
            margin-bottom:8px;
        }

        .timeline-note{
            color:#555;
            line-height:1.7;
        }

        /* ================= EMPTY ================= */

        .empty-box{
            text-align:center;
            padding:50px 20px;
            color:#999;
        }

        .empty-box i{
            font-size:60px;
            margin-bottom:15px;
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:768px){

            .order-title{
                font-size:26px;
            }

            .content-card{
                padding:20px;
            }

            .table-responsive{
                overflow-x:auto;
            }
        }

    </style>

</head>

<body>

<div class="page-wrapper">

    <!-- ================= HEADER ================= -->

    <div class="header-box">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

            <div>

                <div class="order-title">

                    🧾 Đơn hàng
                    #<span th:text="${order.idorders}"></span>

                </div>

                <div class="customer-info">

                    👤 Khách hàng:
                    <strong th:text="${order.namereceiver}"></strong>

                    <br>

                    📞 SĐT:
                    <span th:text="${order.phone}"></span>

                    <br>

                    📍 Địa chỉ:
                    <span th:text="${order.address}"></span>

                </div>

            </div>

            <div class="text-end">

                <!-- STATUS -->

                <div>

                    <span th:if="${order.status == 'PENDING'}"
                          class="status-current pending">

                        Chờ xác nhận

                    </span>

                    <span th:if="${order.status == 'CONFIRMED'}"
                          class="status-current confirmed">

                        Đã xác nhận

                    </span>

                    <span th:if="${order.status == 'SHIPPING'}"
                          class="status-current shipping">

                        Đang giao hàng

                    </span>

                    <span th:if="${order.status == 'COMPLETED'}"
                          class="status-current completed">

                        Hoàn thành

                    </span>

                    <span th:if="${order.status == 'CANCELLED'}"
                          class="status-current cancelled">

                        Đã hủy

                    </span>

                </div>

                <div class="mt-3">

                    <a href="/admin/orders"
                       class="btn btn-dark rounded-pill px-4">

                        <i class="fa fa-arrow-left"></i>
                        Quay lại

                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- ================= ALERT ================= -->

    <div th:if="${success}"
         class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm">

        <i class="fa fa-circle-check"></i>

        <span th:text="${success}"></span>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert">
        </button>

    </div>

    <!-- ================= UPDATE STATUS ================= -->

    <div class="content-card">

        <div class="card-title">

            🚚 Cập nhật trạng thái đơn hàng

        </div>

        <div class="d-flex flex-wrap gap-3">

            <!-- CONFIRM -->

            <form th:action="@{'/admin/orders/update-status/' + ${order.id}}"
                  method="post">

                <input type="hidden"
                       name="status"
                       value="CONFIRMED">

                <button class="status-btn btn-confirm">

                    <i class="fa fa-check"></i>
                    Xác nhận

                </button>

            </form>

            <!-- SHIPPING -->

            <form th:action="@{'/admin/orders/update-status/' + ${order.id}}"
                  method="post">

                <input type="hidden"
                       name="status"
                       value="SHIPPING">

                <button class="status-btn btn-shipping">

                    <i class="fa fa-truck"></i>
                    Giao hàng

                </button>

            </form>

            <!-- COMPLETED -->

            <form th:action="@{'/admin/orders/update-status/' + ${order.id}}"
                  method="post">

                <input type="hidden"
                       name="status"
                       value="COMPLETED">

                <button class="status-btn btn-completed">

                    <i class="fa fa-circle-check"></i>
                    Hoàn thành

                </button>

            </form>

            <!-- CANCEL -->

            <form th:action="@{'/admin/orders/update-status/' + ${order.id}}"
                  method="post"
                  onsubmit="return confirm('Bạn chắc chắn muốn hủy đơn hàng này?')">

                <input type="hidden"
                       name="status"
                       value="CANCELLED">

                <button class="status-btn btn-cancel">

                    <i class="fa fa-ban"></i>
                    Hủy đơn

                </button>

            </form>

        </div>

    </div>

    <!-- ================= PRODUCTS ================= -->

    <div class="content-card">

        <div class="card-title">

            🛍 Sản phẩm đã đặt

        </div>

        <div class="table-responsive">

            <table class="table align-middle">

                <thead>

                <tr>

                    <th>Ảnh</th>
                    <th>Sản phẩm</th>
                    <th>Size</th>
                    <th>Màu</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>

                </tr>

                </thead>

                <tbody>

                <!-- LOOP -->

                <tr th:each="d : ${details}">

                    <!-- IMAGE -->

                    <td width="90">

                        <img th:src="@{/uploads/{img}(img=${d.product.image})}"
                             class="product-img"
                             onerror="this.src='/images/no-image.png'">

                    </td>

                    <!-- PRODUCT -->

                    <td>

                        <div class="product-name"
                             th:text="${d.product.name}">
                        </div>

                        <div class="product-brand"
                             th:text="${d.product.brand}">
                        </div>

                    </td>

                    <!-- SIZE -->

                    <td>

                        <span class="badge-custom badge-size"
                              th:text="${d.size != null ? d.size.name : 'N/A'}">
                        </span>

                    </td>

                    <!-- COLOR -->

                    <td>

                        <span class="badge-custom badge-color"
                              th:text="${d.color != null ? d.color.name : 'N/A'}">
                        </span>

                    </td>

                    <!-- PRICE -->

                    <td class="price">

                        <span th:text="${#numbers.formatDecimal(
                        d.price,
                        0,
                        'COMMA',
                        0,
                        'POINT')}">
                        </span>

                        VNĐ

                    </td>

                    <!-- QTY -->

                    <td>

                        x<span th:text="${d.qty}"></span>

                    </td>

                    <!-- TOTAL -->

                    <td class="total-price">

                        <span th:text="${#numbers.formatDecimal(
                        d.total,
                        0,
                        'COMMA',
                        0,
                        'POINT')}">
                        </span>

                        VNĐ

                    </td>

                </tr>

                <!-- EMPTY -->

                <tr th:if="${#lists.isEmpty(details)}">

                    <td colspan="7">

                        <div class="empty-box">

                            <i class="fa fa-box-open"></i>

                            <h5>
                                Chưa có sản phẩm
                            </h5>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <!-- ================= TRACKING ================= -->

    <div class="content-card">

        <div class="card-title">

            📌 Lịch sử đơn hàng

        </div>

        <div class="timeline">

            <div th:each="t : ${tracking}"
                 class="timeline-item">

                <div class="timeline-dot"></div>

                <div class="timeline-status"
                     th:text="${t.status}">
                </div>

                <div class="timeline-time"
                     th:text="${#dates.format(
                     t.updatedtime,
                     'dd/MM/yyyy HH:mm')}">
                </div>

                <div class="timeline-note"
                     th:text="${t.note}">
                </div>

            </div>

        </div>

    </div>

</div>

<!-- BOOTSTRAP -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
