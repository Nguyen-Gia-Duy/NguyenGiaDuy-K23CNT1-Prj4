<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Thêm sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        body{
            font-family:'Poppins',sans-serif;
            background:#f5f5f5;
        }

        .card-form{
            border:none;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        .preview{
            width:140px;
            height:140px;
            object-fit:cover;
            border-radius:15px;
            margin-top:10px;
            border:1px solid #ddd;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card card-form">

                <div class="card-body p-5">

                    <h2 class="fw-bold mb-4">
                        Thêm sản phẩm
                    </h2>

                    <form th:action="@{/admin/products/store}"
                          method="post"
                          enctype="multipart/form-data"
                          th:object="${product}">

                        <!-- NAME -->
                        <div class="mb-3">

                            <label class="fw-semibold">
                                Tên sản phẩm
                            </label>

                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control">

                        </div>

                        <!-- IMAGE -->
                        <div class="mb-3">

                            <label class="fw-semibold">
                                Ảnh
                            </label>

                            <input type="file"
                                   name="file"
                                   class="form-control"
                                   accept="image/*"
                                   onchange="previewImage(event)">

                            <!-- PREVIEW -->
                            <img id="preview"
                                 class="preview d-none">

                        </div>

                        <!-- PRICE -->
                        <div class="mb-3">

                            <label class="fw-semibold">
                                Giá
                            </label>

                            <input type="number"
                                   th:field="*{price}"
                                   class="form-control">

                        </div>

                        <!-- QUANTITY -->
                        <div class="mb-3">

                            <label class="fw-semibold">
                                Số lượng
                            </label>

                            <input type="number"
                                   th:field="*{quantity}"
                                   class="form-control">

                        </div>

                        <!-- BRAND -->
                        <div class="mb-3">

                            <label class="fw-semibold">
                                Brand
                            </label>

                            <input type="text"
                                   th:field="*{brand}"
                                   class="form-control">

                        </div>

                        <!-- MATERIAL -->
                        <div class="mb-3">

                            <label class="fw-semibold">
                                Chất liệu
                            </label>

                            <input type="text"
                                   th:field="*{material}"
                                   class="form-control">

                        </div>

                        <!-- CATEGORY -->
                        <div class="mb-3">

                            <label class="fw-semibold">
                                Danh mục
                            </label>

                            <select th:field="*{category}"
                                    class="form-select">

                                <option th:each="c : ${categories}"
                                        th:value="${c.id}"
                                        th:text="${c.name}">
                                </option>

                            </select>

                        </div>

                        <!-- DESCRIPTION -->
                        <div class="mb-3">

                            <label class="fw-semibold">
                                Mô tả
                            </label>

                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="5">
                            </textarea>

                        </div>

                        <!-- SALE -->
                        <div class="card border-0 bg-light mt-4">

                            <div class="card-body">

                                <h5 class="fw-bold text-danger mb-3">
                                    🔥 Quản lý Sale
                                </h5>

                                <input type="number"
                                       name="discountpercent"
                                       class="form-control"
                                       min="0"
                                       max="100"
                                       placeholder="% giảm giá">

                            </div>

                        </div>

                        <div class="mt-4">

                            <button class="btn btn-dark px-4 rounded-pill">
                                Thêm sản phẩm
                            </button>

                            <a href="/admin/products"
                               class="btn btn-secondary rounded-pill">

                                Quay lại

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    function previewImage(event){

        const img = document.getElementById('preview');

        img.src = URL.createObjectURL(event.target.files[0]);

        img.classList.remove('d-none');
    }

</script>

</body>
</html>
