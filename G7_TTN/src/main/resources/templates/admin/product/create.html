
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Thêm sản phẩm | Admin</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap"
          rel="stylesheet">

    <!-- ICON -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            font-family:'Poppins',sans-serif;
            background:#f5f5f5;
        }

        .card-form{
            border:none;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .form-header{
            background:linear-gradient(135deg,#111,#333);
            color:#fff;
            padding:30px;
        }

        .form-header h2{
            font-weight:700;
            margin-bottom:5px;
        }

        .form-control,
        .form-select{
            border-radius:14px;
            padding:12px 15px;
            border:1px solid #ddd;
            transition:0.3s;
        }

        .form-control:focus,
        .form-select:focus{
            border-color:#111;
            box-shadow:0 0 0 0.15rem rgba(0,0,0,0.1);
        }

        .form-label{
            font-weight:600;
            margin-bottom:8px;
        }

        .preview-box{
            width:100%;
            height:260px;
            border:2px dashed #ddd;
            border-radius:20px;
            overflow:hidden;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#fafafa;
            transition:0.3s;
        }

        .preview-box:hover{
            border-color:#111;
        }

        .preview{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .upload-placeholder{
            text-align:center;
            color:#999;
        }

        .sale-box{
            background:#fff5f5;
            border:1px solid #ffd6d6;
            border-radius:18px;
            padding:25px;
        }

        .btn-dark{
            border-radius:14px;
            padding:12px 25px;
        }

        .btn-secondary{
            border-radius:14px;
            padding:12px 25px;
        }

        textarea{
            resize:none;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card card-form">

                <!-- HEADER -->
                <div class="form-header">

                    <h2>
                        📦 Thêm sản phẩm
                    </h2>

                    <p class="mb-0 text-light">
                        Quản lý và thêm sản phẩm mới cho hệ thống
                    </p>

                </div>

                <!-- BODY -->
                <div class="card-body p-5">

                    <form th:action="@{/admin/products/store}"
                          method="post"
                          enctype="multipart/form-data"
                          th:object="${product}">

                        <div class="row">

                            <!-- LEFT -->
                            <div class="col-lg-7">

                                <!-- NAME -->
                                <div class="mb-4">

                                    <label class="form-label">
                                        Tên sản phẩm
                                    </label>

                                    <input type="text"
                                           th:field="*{name}"
                                           class="form-control"
                                           placeholder="Nhập tên sản phẩm"
                                           required>

                                </div>

                                <!-- PRICE + QUANTITY -->
                                <div class="row">

                                    <div class="col-md-6 mb-4">

                                        <label class="form-label">
                                            Giá sản phẩm
                                        </label>

                                        <input type="number"
                                               th:field="*{price}"
                                               class="form-control"
                                               placeholder="VD: 500000"
                                               required>

                                    </div>

                                    <div class="col-md-6 mb-4">

                                        <label class="form-label">
                                            Số lượng
                                        </label>

                                        <input type="number"
                                               th:field="*{quantity}"
                                               class="form-control"
                                               placeholder="VD: 10"
                                               required>

                                    </div>

                                </div>

                                <!-- BRAND -->
                                <div class="mb-4">

                                    <label class="form-label">
                                        Brand
                                    </label>

                                    <input type="text"
                                           th:field="*{brand}"
                                           class="form-control"
                                           placeholder="VD: Nike">

                                </div>

                                <!-- MATERIAL -->
                                <div class="mb-4">

                                    <label class="form-label">
                                        Chất liệu
                                    </label>

                                    <input type="text"
                                           th:field="*{material}"
                                           class="form-control"
                                           placeholder="VD: Cotton 100%">

                                </div>

                                <!-- CATEGORY -->
                                <div class="mb-4">

                                    <label class="form-label">
                                        Danh mục
                                    </label>

                                    <select name="category.id"
                                            class="form-select"
                                            required>

                                        <option value="">
                                            -- Chọn danh mục --
                                        </option>

                                        <option th:each="c : ${categories}"
                                                th:value="${c.id}"
                                                th:text="${c.name}">
                                        </option>

                                    </select>

                                </div>

                            </div>

                            <!-- RIGHT -->
                            <div class="col-lg-5">

                                <!-- IMAGE -->
                                <div class="mb-4">

                                    <label class="form-label">
                                        Hình ảnh sản phẩm
                                    </label>

                                    <input type="file"
                                           name="file"
                                           class="form-control"
                                           accept="image/*"
                                           onchange="previewImage(event)"
                                           required>

                                    <!-- PREVIEW -->
                                    <div class="preview-box mt-3">

                                        <div id="placeholder"
                                             class="upload-placeholder">

                                            <i class="fa fa-image fa-3x mb-3"></i>

                                            <p>
                                                Xem trước ảnh sản phẩm
                                            </p>

                                        </div>

                                        <img id="preview"
                                             class="preview d-none">

                                    </div>

                                </div>

                                <!-- SALE -->
                                <div class="sale-box">

                                    <h5 class="fw-bold text-danger mb-3">
                                        🔥 Thiết lập giảm giá
                                    </h5>

                                    <label class="form-label">
                                        Phần trăm giảm giá
                                    </label>

                                    <input type="number"
                                           name="discountpercent"
                                           class="form-control"
                                           min="0"
                                           max="100"
                                           placeholder="VD: 20">

                                    <small class="text-muted mt-2 d-block">
                                        Để trống nếu không giảm giá
                                    </small>

                                </div>

                            </div>

                        </div>

                        <!-- DESCRIPTION -->
                        <div class="mt-4">

                            <label class="form-label">
                                Mô tả sản phẩm
                            </label>

                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="6"
                                      placeholder="Nhập mô tả chi tiết sản phẩm...">
                            </textarea>

                        </div>

                        <!-- BUTTON -->
                        <div class="mt-5 d-flex gap-3">

                            <button class="btn btn-dark">

                                <i class="fa fa-plus"></i>
                                Thêm sản phẩm

                            </button>

                            <a href="/admin/products"
                               class="btn btn-secondary">

                                Quay lại

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    function previewImage(event){

        const file =
            event.target.files[0];

        if(file){

            const img =
                document.getElementById('preview');

            const placeholder =
                document.getElementById('placeholder');

            img.src =
                URL.createObjectURL(file);

            img.classList.remove('d-none');

            placeholder.classList.add('d-none');
        }
    }

</script>

</body>
</html>
```
