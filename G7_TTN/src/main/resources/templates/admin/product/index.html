<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Quản lý sản phẩm | Admin</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- ICON -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#f4f7fb;
        }

        /* SIDEBAR */

        .sidebar{
            width:270px;
            height:100vh;
            position:fixed;
            top:0;
            left:0;
            background:linear-gradient(180deg,#111,#1e1e1e);
            padding:30px 20px;
            overflow:auto;
        }

        .logo{
            color:#fff;
            font-size:28px;
            font-weight:700;
            margin-bottom:40px;
            text-align:center;
        }

        .sidebar-menu a{
            display:flex;
            align-items:center;
            gap:12px;

            color:#cfcfcf;
            text-decoration:none;

            padding:14px 18px;
            border-radius:14px;

            margin-bottom:12px;

            transition:0.3s;
            font-size:15px;
        }

        .sidebar-menu a:hover{
            background:#2a2a2a;
            color:#fff;
            transform:translateX(5px);
        }

        .sidebar-menu .active{
            background:linear-gradient(90deg,#ff416c,#ff4b2b);
            color:#fff;
            box-shadow:0 5px 15px rgba(255,75,43,0.3);
        }

        /* CONTENT */

        .content{
            margin-left:270px;
            padding:35px;
        }

        /* TOPBAR */

        .topbar{
            background:#fff;
            padding:25px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.05);

            display:flex;
            justify-content:space-between;
            align-items:center;

            margin-bottom:30px;
        }

        .topbar h2{
            font-weight:700;
            margin-bottom:5px;
        }

        .topbar p{
            color:#777;
            margin:0;
        }

        .btn-add{
            background:linear-gradient(90deg,#111,#333);
            border:none;
            color:#fff;

            padding:12px 22px;
            border-radius:50px;

            font-weight:600;
            transition:0.3s;
        }

        .btn-add:hover{
            transform:translateY(-3px);
            background:#000;
        }

        /* TABLE CARD */

        .table-card{
            background:#fff;
            border-radius:22px;
            padding:25px;
            box-shadow:0 8px 25px rgba(0,0,0,0.06);
        }

        .table{
            margin:0;
        }

        .table thead{
            background:#f8f9fc;
        }

        .table thead th{
            border:none;
            padding:18px 15px;
            font-size:14px;
            color:#666;
            font-weight:600;
        }

        .table tbody td{
            vertical-align:middle;
            padding:18px 15px;
            border-color:#f1f1f1;
        }

        .table tbody tr{
            transition:0.3s;
        }

        .table tbody tr:hover{
            background:#fafafa;
        }

        /* PRODUCT IMAGE */

        .product-image{
            width:75px;
            height:75px;
            object-fit:cover;
            border-radius:16px;
            border:2px solid #f1f1f1;
        }

        /* PRODUCT INFO */

        .product-name{
            font-weight:600;
            color:#111;
            margin-bottom:3px;
        }

        .product-brand{
            font-size:13px;
            color:#888;
        }

        /* PRICE */

        .price{
            color:#ff3b30;
            font-weight:700;
            font-size:16px;
        }

        /* SALE */

        .sale-badge{
            display:inline-block;

            background:linear-gradient(90deg,#ff416c,#ff4b2b);

            color:#fff;

            padding:6px 14px;
            border-radius:50px;

            font-size:13px;
            font-weight:600;
        }

        .no-sale{
            color:#999;
            font-size:14px;
        }

        /* CATEGORY */

        .category-badge{
            background:#eef2ff;
            color:#4f46e5;

            padding:8px 14px;
            border-radius:50px;

            font-size:13px;
            font-weight:600;
        }

        /* QUANTITY */

        .quantity{
            font-weight:600;
        }

        .quantity.low{
            color:red;
        }

        .quantity.ok{
            color:green;
        }

        /* ACTION */

        .action-btn{
            width:38px;
            height:38px;

            border:none;
            border-radius:12px;

            color:#fff;

            transition:0.3s;
        }

        .btn-edit{
            background:#f59e0b;
        }

        .btn-delete{
            background:#ef4444;
        }

        .action-btn:hover{
            transform:translateY(-2px);
            opacity:0.9;
        }

        /* EMPTY */

        .empty-box{
            text-align:center;
            padding:60px 20px;
            color:#999;
        }

        .empty-box i{
            font-size:60px;
            margin-bottom:15px;
        }

    </style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        ⚙ G7 ADMIN
    </div>

    <div class="sidebar-menu">

        <a href="/admin">
            <i class="fa fa-chart-line"></i>
            Dashboard
        </a>

        <a href="/admin/products"
           class="active">

            <i class="fa fa-box"></i>
            Quản lý sản phẩm

        </a>

        <a href="/admin/categories">
            <i class="fa fa-tags"></i>
            Danh mục
        </a>

        <a href="/admin/orders">
            <i class="fa fa-cart-shopping"></i>
            Đơn hàng
        </a>

        <a href="/user">
            <i class="fa fa-home"></i>
            Trang người dùng
        </a>

    </div>

</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOPBAR -->
    <div class="topbar">

        <div>

            <h2>
                Quản lý sản phẩm
            </h2>

            <p>
                Quản lý toàn bộ sản phẩm trong hệ thống G7 Fashion
            </p>

        </div>

        <a href="/admin/products/create"
           class="btn btn-add">

            <i class="fa fa-plus"></i>
            Thêm sản phẩm

        </a>

    </div>

    <!-- TABLE -->
    <div class="table-card">

        <div class="table-responsive">

            <table class="table align-middle">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Ảnh</th>
                    <th>Sản phẩm</th>
                    <th>Giá</th>
                    <th>Sale</th>
                    <th>Danh mục</th>
                    <th>Số lượng</th>
                    <th>Hành động</th>

                </tr>

                </thead>

                <tbody>

                <!-- LOOP -->
                <tr th:each="p : ${products}">

                    <!-- ID -->
                    <td>

                        <strong>#<span th:text="${p.id}"></span></strong>

                    </td>

                    <!-- IMAGE -->
                    <td>

                        <img th:if="${p.image != null}"
                             th:src="@{/uploads/{img}(img=${p.image})}"
                             class="product-image">

                        <img th:if="${p.image == null}"
                             src="https://via.placeholder.com/75"
                             class="product-image">

                    </td>

                    <!-- NAME -->
                    <td>

                        <div class="product-name"
                             th:text="${p.name}">
                        </div>

                        <div class="product-brand"
                             th:text="${p.brand}">
                        </div>

                    </td>

                    <!-- PRICE -->
                    <td>

                        <div class="price">

                            <span th:text="${#numbers.formatDecimal(
                            p.price,
                            0,
                            'COMMA',
                            0,
                            'POINT')}">
                            </span>

                            VNĐ

                        </div>

                    </td>

                    <!-- SALE -->
                    <td>

                        <span th:if="${p.sale != null}"
                              class="sale-badge">

                            -<span th:text="${p.sale.discountpercent}"></span>%

                        </span>

                        <span th:if="${p.sale == null}"
                              class="no-sale">

                            Không sale

                        </span>

                    </td>

                    <!-- CATEGORY -->
                    <td>

                        <span class="category-badge"
                              th:text="${p.category.name}">
                        </span>

                    </td>

                    <!-- QUANTITY -->
                    <td>

                        <span th:text="${p.quantity}"
                              th:classappend="${p.quantity <= 5}
                              ? 'quantity low'
                              : 'quantity ok'">

                        </span>

                    </td>

                    <!-- ACTION -->
                    <td>

                        <div class="d-flex gap-2">

                            <!-- EDIT -->
                            <a th:href="@{'/admin/products/edit/' + ${p.id}}">

                                <button class="action-btn btn-edit">

                                    <i class="fa fa-pen"></i>

                                </button>

                            </a>

                            <form th:action="@{'/admin/products/delete/' + ${p.id}}"
                                  method="post"
                                  onsubmit="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">

                                <button type="submit"
                                        class="action-btn btn-delete">

                                    <i class="fa fa-trash"></i>

                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

                <!-- EMPTY -->
                <tr th:if="${#lists.isEmpty(products)}">

                    <td colspan="8">

                        <div class="empty-box">

                            <i class="fa fa-box-open"></i>

                            <h5>
                                Chưa có sản phẩm nào
                            </h5>

                            <p>
                                Hãy thêm sản phẩm đầu tiên cho cửa hàng
                            </p>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
