<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Quản lý sản phẩm | Admin</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICON -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        body{
            font-family:'Poppins',sans-serif;
            background:#f5f5f5;
        }

        .sidebar{
            width:260px;
            height:100vh;
            position:fixed;
            background:#111;
            color:#fff;
            padding:30px 20px;
        }

        .sidebar a{
            display:block;
            color:#ccc;
            text-decoration:none;
            padding:12px 15px;
            border-radius:10px;
            margin-bottom:10px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#222;
            color:#fff;
        }

        .content{
            margin-left:280px;
            padding:30px;
        }

        .card-box{
            border:none;
            border-radius:18px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        .table img{
            width:70px;
            height:70px;
            object-fit:cover;
            border-radius:10px;
        }

        .badge-sale{
            background:red;
            color:#fff;
            padding:6px 12px;
            border-radius:30px;
            font-size:13px;
        }

    </style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h3 class="fw-bold mb-4">
        ⚙ ADMIN
    </h3>

    <a href="/admin">
        <i class="fa fa-chart-line"></i>
        Dashboard
    </a>

    <a href="/admin/products"
       class="bg-danger text-white">

        <i class="fa fa-box"></i>
        Sản phẩm
    </a>

    <a href="/user">
        <i class="fa fa-home"></i>
        Trang người dùng
    </a>

</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOP -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold">
                Quản lý sản phẩm
            </h2>

            <p class="text-muted">
                Danh sách toàn bộ sản phẩm trong hệ thống
            </p>
        </div>

        <a href="/admin/products/create"
           class="btn btn-dark rounded-pill px-4">

            <i class="fa fa-plus"></i>
            Thêm sản phẩm

        </a>

    </div>

    <!-- TABLE -->
    <div class="card card-box">

        <div class="card-body">

            <table class="table align-middle table-hover">

                <thead>

                <tr>
                    <th>ID</th>
                    <th>Ảnh</th>
                    <th>Tên</th>
                    <th>Giá</th>
                    <th>Sale</th>
                    <th>Danh mục</th>
                    <th>Số lượng</th>
                    <th width="180">Hành động</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="p : ${products}">

                    <td th:text="${p.id}"></td>

                    <td>

                        <img th:if="${p.images != null and !p.images.isEmpty()}"
                             th:src="@{/images/{img}(img=${p.images[0].urlimg})}"
                             class="card-img-top product-img">

                    </td>

                    <td>

                        <div class="fw-semibold"
                             th:text="${p.name}">
                        </div>

                        <small class="text-muted"
                               th:text="${p.brand}">
                        </small>

                    </td>

                    <td class="text-danger fw-bold">

                        <span th:text="${#numbers.formatDecimal(
                        p.price,
                        0,
                        'COMMA',
                        0,
                        'POINT')}">
                        </span>

                        VNĐ

                    </td>

                    <td>

                        <span th:if="${p.sale != null}"
                              class="badge-sale">

                            -<span th:text="${p.sale.discountpercent}"></span>%

                        </span>

                        <span th:if="${p.sale == null}">
                            Không
                        </span>

                    </td>

                    <td th:text="${p.category.name}"></td>

                    <td th:text="${p.quantity}"></td>

                    <td>

                        <a th:href="@{'/admin/products/edit/' + ${p.id}}"
                           class="btn btn-warning btn-sm rounded-pill">

                            <i class="fa fa-pen"></i>

                        </a>

                        <a th:href="@{'/admin/products/delete/' + ${p.id}}"
                           onclick="return confirm('Xóa sản phẩm?')"
                           class="btn btn-danger btn-sm rounded-pill">

                            <i class="fa fa-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
