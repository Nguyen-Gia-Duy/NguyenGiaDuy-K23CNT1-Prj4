<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Thêm quảng cáo
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="col-lg-8 mx-auto">

        <div class="card shadow border-0">

            <div class="card-body p-4">

                <h3 class="mb-4">
                    Thêm quảng cáo
                </h3>
                <input type="hidden" th:field="*{id}">
                <form th:action="@{/admin/advertisement/save}"
                      th:object="${ad}"
                      method="post">

                    <!-- NAME -->

                    <div class="mb-3">

                        <label class="form-label">
                            Tên quảng cáo
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{name}"
                               required>

                    </div>

                    <!-- IMAGE -->

                    <div class="mb-3">

                        <label class="form-label">
                            Ảnh
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{image}">

                    </div>

                    <!-- LINK -->

                    <div class="mb-3">

                        <label class="form-label">
                            Link URL
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{linkurl}">

                    </div>

                    <!-- POSITION -->

                    <div class="mb-3">

                        <label class="form-label">
                            Vị trí
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{position}">

                    </div>

                    <!-- START -->

                    <div class="mb-3">

                        <label class="form-label">
                            Ngày bắt đầu
                        </label>

                        <input type="datetime-local"
                               class="form-control"
                               th:field="*{startdate}">

                    </div>

                    <!-- END -->

                    <div class="mb-3">

                        <label class="form-label">
                            Ngày kết thúc
                        </label>

                        <input type="datetime-local"
                               class="form-control"
                               th:field="*{enddate}">

                    </div>

                    <!-- STATUS -->

                    <div class="mb-4">

                        <label class="form-label">
                            Trạng thái
                        </label>

                        <select class="form-select"
                                th:field="*{isactive}">

                            <option value="1">
                                Hiển thị
                            </option>

                            <option value="0">
                                Ẩn
                            </option>

                        </select>

                    </div>

                    <!-- BUTTON -->

                    <button class="btn btn-dark">

                        Lưu quảng cáo

                    </button>

                    <a href="/admin/advertisement"
                       class="btn btn-secondary">

                        Quay lại

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
