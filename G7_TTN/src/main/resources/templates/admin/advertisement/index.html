<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Quản lý quảng cáo
    </title>

    <!-- FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f5f6fa;
        }

        /* ================= SIDEBAR ================= */

        .sidebar{
            width:240px;
            height:100vh;

            position:fixed;

            top:0;
            left:0;

            background:#111;

            padding-top:25px;

            overflow-y:auto;
        }

        .logo{
            color:#fff;

            text-align:center;

            font-size:28px;

            font-weight:700;

            margin-bottom:35px;
        }

        .sidebar a{

            display:flex;

            align-items:center;

            gap:12px;

            padding:14px 22px;

            color:#ccc;

            text-decoration:none;

            transition:0.3s;
        }

        .sidebar a:hover{

            background:#1e1e1e;

            color:#fff;
        }

        .sidebar .active{

            background:#0d6efd;

            color:#fff;
        }

        /* ================= CONTENT ================= */

        .content{

            margin-left:240px;

            padding:30px;
        }

        /* ================= TOPBAR ================= */

        .topbar{

            background:#fff;

            padding:20px 25px;

            border-radius:18px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-bottom:25px;

            box-shadow:0 5px 20px rgba(0,0,0,0.05);
        }

        .topbar h3{

            margin:0;

            font-weight:700;
        }

        .topbar p{

            margin:0;

            color:#777;

            font-size:14px;
        }

        /* ================= TABLE ================= */

        .table-box{

            background:#fff;

            border-radius:22px;

            padding:25px;

            box-shadow:0 5px 20px rgba(0,0,0,0.05);
        }

        .table thead th{

            background:#f8f9fa;

            border:none;

            color:#666;
        }

        /* ================= IMAGE ================= */

        .ads-image{

            width:120px;

            height:70px;

            object-fit:cover;

            border-radius:10px;

            border:1px solid #ddd;
        }

        /* ================= ACTION BUTTON ================= */

        .btn-action{

            width:38px;

            height:38px;

            border:none;

            border-radius:12px;

            color:#fff;

            transition:0.3s;
        }

        .btn-action:hover{

            transform:translateY(-2px);

            opacity:0.9;
        }

        .btn-edit{

            background:#f59e0b;
        }

        .btn-delete{

            background:#dc3545;
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:992px){

            .sidebar{

                width:100%;

                height:auto;

                position:relative;
            }

            .content{

                margin-left:0;
            }
        }

    </style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

    <div class="logo">
        ⚙ G7 ADMIN
    </div>

    <!-- DASHBOARD -->

    <a href="/admin">

        <i class="fa-solid fa-chart-line"></i>

        Dashboard

    </a>

    <!-- PRODUCT -->

    <a href="/admin/products">

        <i class="fa-solid fa-box"></i>

        Sản phẩm

    </a>

    <!-- CATEGORY -->

    <a href="/admin/category">

        <i class="fa-solid fa-layer-group"></i>

        Danh mục

    </a>

    <!-- ORDER -->

    <a href="/admin/orders">

        <i class="fa-solid fa-cart-shopping"></i>

        Đơn hàng

    </a>

    <!-- USER -->

    <a href="/admin/users">

        <i class="fa-solid fa-users"></i>

        Người dùng

    </a>

    <!-- ADVERTISEMENT -->

    <a href="/admin/advertisement"
       class="active">

        <i class="fa-solid fa-image"></i>

        Quảng cáo

    </a>

    <!-- USER PAGE -->

    <a href="/user">

        <i class="fa-solid fa-house"></i>

        Trang user

    </a>

    <!-- DIVIDER -->

    <hr class="text-secondary">

    <!-- LOGOUT -->

    <a href="/logout"
       class="text-danger">

        <i class="fa-solid fa-right-from-bracket"></i>

        Đăng xuất

    </a>

</div>

<!-- ================= CONTENT ================= -->

<div class="content">

    <!-- TOPBAR -->

    <div class="topbar">

        <div>

            <h3>
                Quản lý quảng cáo
            </h3>

            <p class="text-muted">
                Banner & Advertisement
            </p>

        </div>

        <a href="/admin/advertisement/create"
           class="btn btn-dark">

            <i class="fa fa-plus"></i>

            Thêm quảng cáo

        </a>

    </div>

    <!-- TABLE -->

    <div class="table-box">

        <div class="table-responsive">

            <table class="table align-middle">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Hình ảnh</th>
                    <th>Tên</th>
                    <th>Vị trí</th>
                    <th>Link</th>
                    <th>Bắt đầu</th>
                    <th>Kết thúc</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="a : ${ads}">

                    <!-- ID -->

                    <td>

                        #<span th:text="${a.id}"></span>

                    </td>

                    <!-- IMAGE -->

                    <td>

                        <img th:if="${a.image != null and !#strings.isEmpty(a.image)}"
                             th:src="@{/uploads/{img}(img=${a.image})}"
                             class="ads-image">

                        <span th:if="${a.image == null or #strings.isEmpty(a.image)}"
                              class="text-muted">

                            No Image

                        </span>

                    </td>

                    <!-- NAME -->

                    <td th:text="${a.name}"></td>

                    <!-- POSITION -->

                    <td th:text="${a.position}"></td>

                    <!-- LINK -->

                    <td>

                        <a th:if="${a.linkurl != null and !#strings.isEmpty(a.linkurl)}"
                           th:href="${a.linkurl}"
                           target="_blank">

                            Xem link

                        </a>

                        <span th:if="${a.linkurl == null or #strings.isEmpty(a.linkurl)}"
                              class="text-muted">

                            Không có

                        </span>

                    </td>

                    <!-- START DATE -->

                    <td th:text="${a.startdate != null ? #dates.format(a.startdate,'dd/MM/yyyy HH:mm') : ''}">

                    </td>

                    <!-- END DATE -->

                    <td th:text="${a.enddate != null ? #dates.format(a.enddate,'dd/MM/yyyy HH:mm') : ''}">

                    </td>

                    <!-- STATUS -->

                    <td>

                        <span th:if="${a.isactive == 1}"
                              class="badge bg-success">

                            Hiển thị

                        </span>

                        <span th:if="${a.isactive == 0}"
                              class="badge bg-secondary">

                            Ẩn

                        </span>

                    </td>

                    <!-- ACTION -->

                    <td>

                        <div class="d-flex gap-2">

                            <!-- EDIT -->

                            <a th:href="@{/admin/advertisement/edit/{id}(id=${a.id})}">

                                <button type="button"
                                        class="btn-action btn-edit">

                                    <i class="fa fa-pen"></i>

                                </button>

                            </a>

                            <!-- DELETE -->

                            <form th:action="@{/admin/advertisement/delete/{id}(id=${a.id})}"
                                  method="post">

                                <button type="submit"
                                        class="btn-action btn-delete"
                                        onclick="return confirm('Bạn muốn ẩn quảng cáo này?')">

                                    <i class="fa fa-eye-slash"></i>

                                </button>

                            </form>

                        </div>

                    </td>

                </tr>

                <!-- EMPTY DATA -->

                <tr th:if="${#lists.isEmpty(ads)}">

                    <td colspan="9"
                        class="text-center text-muted py-4">

                        Chưa có quảng cáo nào

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
