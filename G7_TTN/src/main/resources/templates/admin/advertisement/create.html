<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Quản lý quảng cáo | G7 Fashion
    </title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f5f6fa;
        }

        /* ================= CARD ================= */

        .ads-card{

            border:none;

            border-radius:28px;

            overflow:hidden;

            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        /* ================= HEADER ================= */

        .card-header-custom{

            background:linear-gradient(
                    135deg,
                    #111827,
                    #1f2937
            );

            color:#fff;

            padding:30px;
        }

        .card-header-custom h2{

            margin:0;

            font-weight:700;
        }

        .card-header-custom p{

            margin-top:8px;

            color:#d1d5db;
        }

        /* ================= BODY ================= */

        .card-body{

            padding:35px;
        }

        /* ================= LABEL ================= */

        .form-label{

            font-weight:600;

            margin-bottom:10px;
        }

        /* ================= INPUT ================= */

        .form-control,
        .form-select{

            border-radius:14px;

            padding:12px 15px;

            border:1px solid #ddd;

            transition:0.3s;
        }

        .form-control:focus,
        .form-select:focus{

            border-color:#0d6efd;

            box-shadow:0 0 0 0.15rem rgba(13,110,253,0.15);
        }

        /* ================= IMAGE PREVIEW ================= */

        .preview-box{

            width:100%;

            height:250px;

            border-radius:20px;

            overflow:hidden;

            background:#f1f5f9;

            display:flex;

            align-items:center;

            justify-content:center;

            margin-top:15px;

            border:2px dashed #cbd5e1;
        }

        .preview-box img{

            width:100%;

            height:100%;

            object-fit:cover;
        }

        .preview-text{

            color:#94a3b8;

            font-size:15px;
        }

        /* ================= BUTTON ================= */

        .btn-save{

            background:#111827;

            color:#fff;

            border:none;

            border-radius:50px;

            padding:12px 28px;

            font-weight:600;

            transition:0.3s;
        }

        .btn-save:hover{

            background:#0d6efd;

            color:#fff;

            transform:translateY(-2px);
        }

        .btn-back{

            border-radius:50px;

            padding:12px 24px;

            font-weight:600;
        }

        /* ================= BADGE ================= */

        .position-guide{

            background:#eef2ff;

            color:#4f46e5;

            padding:14px 18px;

            border-radius:16px;

            font-size:14px;

            margin-top:15px;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="col-lg-8 mx-auto">

        <div class="card ads-card">

            <!-- HEADER -->

            <div class="card-header-custom">

                <h2>

                    <i class="fa-solid fa-image"></i>

                    Quản lý quảng cáo

                </h2>

                <p>

                    Thêm hoặc chỉnh sửa banner quảng cáo cho G7 Fashion

                </p>

            </div>

            <!-- BODY -->

            <div class="card-body">

                <form th:action="@{/admin/advertisement/save}"
                      th:object="${ad}"
                      method="post"
                      enctype="multipart/form-data">

                    <!-- ID -->

                    <input type="hidden"
                           th:field="*{id}">

                    <!-- NAME -->

                    <div class="mb-4">

                        <label class="form-label">
                            Tên quảng cáo
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{name}"
                               required>

                    </div>

                    <!-- IMAGE FILE -->

                    <div class="mb-4">

                        <label class="form-label">
                            Ảnh quảng cáo
                        </label>

                        <input type="file"
                               id="imageInput"
                               name="file"
                               class="form-control"
                               accept="image/*"
                               onchange="previewFile(event)">

                        <!-- PREVIEW -->

                        <div class="preview-box mt-3">

                            <img id="previewImage"
                                 th:if="${ad.image != null and !#strings.isEmpty(ad.image)}"
                                 th:src="@{/uploads/{img}(img=${ad.image})}">

                            <span id="previewText"
                                  class="preview-text"
                                  th:if="${ad.image == null or #strings.isEmpty(ad.image)}">

                                Chưa có ảnh quảng cáo

                            </span>

                        </div>

                    </div>

                    <!-- LINK URL -->

                    <div class="mb-4">

                        <label class="form-label">
                            Link khi bấm quảng cáo
                        </label>

                        <input type="text"
                               class="form-control"
                               placeholder="/products/1 hoặc https://..."
                               th:field="*{linkurl}">

                    </div>

                    <!-- POSITION -->

                    <div class="mb-4">

                        <label class="form-label">
                            Vị trí quảng cáo
                        </label>

                        <select class="form-select"
                                th:field="*{position}">

                            <option value="HOME_TOP">
                                HOME_TOP
                            </option>

                            <option value="HOME_SLIDER">
                                HOME_SLIDER
                            </option>

                            <option value="HOME_MIDDLE">
                                HOME_MIDDLE
                            </option>

                        </select>

                        <div class="position-guide">

                            HOME_TOP = Banner đầu trang <br>

                            HOME_SLIDER = Slider chính <br>

                            HOME_MIDDLE = Banner giữa trang

                        </div>

                    </div>

                    <!-- START DATE -->

                    <div class="mb-4">

                        <label class="form-label">
                            Ngày bắt đầu
                        </label>

                        <input type="datetime-local"
                               class="form-control"
                               th:value="${ad.startdate != null ? #dates.format(ad.startdate,'yyyy-MM-dd''T''HH:mm') : ''}"
                               name="startdate">

                    </div>

                    <!-- END DATE -->

                    <div class="mb-4">

                        <label class="form-label">
                            Ngày kết thúc
                        </label>

                        <input type="datetime-local"
                               class="form-control"
                               th:value="${ad.enddate != null ? #dates.format(ad.enddate,'yyyy-MM-dd''T''HH:mm') : ''}"
                               name="enddate">

                    </div>

                    <!-- STATUS -->

                    <div class="mb-4">

                        <label class="form-label">
                            Trạng thái
                        </label>

                        <select class="form-select"
                                th:field="*{isactive}">

                            <option value="1">
                                Hiển thị
                            </option>

                            <option value="0">
                                Ẩn
                            </option>

                        </select>

                    </div>

                    <!-- BUTTON -->

                    <div class="d-flex gap-3">

                        <button type="submit"
                                class="btn btn-save">

                            <i class="fa-solid fa-floppy-disk"></i>

                            Lưu quảng cáo

                        </button>

                        <a href="/admin/advertisement"
                           class="btn btn-outline-secondary btn-back">

                            Quay lại

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- IMAGE PREVIEW -->

<script>

    function previewFile(event){

        const file =
            event.target.files[0];

        const previewImage =
            document.getElementById('previewImage');

        const previewText =
            document.getElementById('previewText');

        if(file){

            const reader =
                new FileReader();

            reader.onload =
                function(e){

                    if(previewImage){

                        previewImage.src =
                            e.target.result;

                    }else{

                        const img =
                            document.createElement('img');

                        img.src =
                            e.target.result;

                        img.id =
                            'previewImage';

                        document
                            .querySelector('.preview-box')
                            .appendChild(img);
                    }

                    if(previewText){

                        previewText.style.display =
                            'none';
                    }
                };

            reader.readAsDataURL(file);
        }
    }

</script>

</body>

</html>
