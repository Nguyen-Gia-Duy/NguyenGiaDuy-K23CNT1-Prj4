<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Cập nhật người dùng
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow border-0">

                <div class="card-header bg-warning">

                    <h4>
                        Cập nhật người dùng
                    </h4>

                </div>

                <div class="card-body">

                    <form th:action="@{/admin/users/save}"
                          th:object="${user}"
                          method="post">

                        <input type="hidden"
                               th:field="*{id}">

                        <div class="mb-3">

                            <label>Họ tên</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{name}">

                        </div>

                        <div class="mb-3">

                            <label>Username</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{username}">

                        </div>

                        <div class="mb-3">

                            <label>Password mới</label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{password}">

                            <small class="text-muted">
                                Để trống nếu không đổi mật khẩu
                            </small>

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}">

                        </div>

                        <div class="mb-3">

                            <label>Phone</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{phone}">

                        </div>

                        <div class="mb-3">

                            <label>Address</label>

                            <textarea class="form-control"
                                      th:field="*{address}">
                            </textarea>

                        </div>

                        <div class="mb-3">

                            <label>Role</label>

                            <select class="form-select"
                                    th:field="*{role}">

                                <option value="USER">
                                    USER
                                </option>

                                <option value="ADMIN">
                                    ADMIN
                                </option>

                            </select>

                        </div>

                        <button type="submit"
                                class="btn btn-warning">

                            Cập nhật

                        </button>

                        <a href="/admin/users"
                           class="btn btn-secondary">

                            Quay lại

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
