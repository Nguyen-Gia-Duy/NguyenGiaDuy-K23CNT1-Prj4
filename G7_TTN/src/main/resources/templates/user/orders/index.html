<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng của tôi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .order-card{
            background:#fff;
            border-radius:18px;
            padding:18px;
            margin-bottom:18px;
            box-shadow:0 8px 25px rgba(0,0,0,0.05);
            transition:.3s;
        }

        .order-card:hover{
            transform:translateY(-4px);
            box-shadow:0 12px 30px rgba(0,0,0,0.1);
        }

        .status{
            padding:5px 12px;
            border-radius:50px;
            font-size:13px;
            font-weight:600;
        }

        .PENDING{ background:#fff3cd; color:#856404; }
        .SHIPPING{ background:#cce5ff; color:#004085; }
        .DONE{ background:#d4edda; color:#155724; }
        .CANCEL{ background:#f8d7da; color:#721c24; }

        .price{
            color:#dc3545;
            font-weight:700;
            font-size:18px;
        }

        .btn-detail{
            border-radius:50px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h2 class="mb-4 fw-bold">🧾 Đơn hàng của tôi</h2>

    <div th:each="o : ${orders}" class="order-card">

        <div class="d-flex justify-content-between align-items-center">

            <div>
                <div class="fw-bold">
                    Đơn hàng #<span th:text="${o.id}"></span>
                </div>

                <div class="text-muted small">
                    Ngày: <span th:text="${o.ordersdate}"></span>
                </div>
            </div>

            <span class="status"
                  th:text="${o.status}"
                  th:classappend="${o.status}">
            </span>

        </div>

        <hr>

        <div class="d-flex justify-content-between align-items-center">

            <div>
                <div class="text-muted">Tổng tiền</div>
                <div class="price"
                     th:text="${#numbers.formatDecimal(o.totalmoney,0,'COMMA',0,'POINT')} + ' VNĐ'">
                </div>
            </div>

            <a th:href="@{'/orders/' + ${o.id}}"
               class="btn btn-dark btn-detail px-4">
                Xem chi tiết
            </a>

        </div>

    </div>

</div>

</body>
</html>
