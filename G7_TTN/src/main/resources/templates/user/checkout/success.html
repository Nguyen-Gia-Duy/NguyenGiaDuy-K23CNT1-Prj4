<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thành công</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            font-family:Arial;
        }

        .box{
            max-width:500px;
            margin:120px auto;
            background:#fff;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .check{
            width:80px;
            height:80px;
            background:#198754;
            color:#fff;
            font-size:40px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:auto;
        }

        h2{
            margin-top:20px;
            font-weight:700;
        }

        .btn-home{
            margin-top:20px;
            display:inline-block;
            padding:12px 25px;
            background:#111;
            color:#fff;
            border-radius:30px;
            text-decoration:none;
        }

        .btn-home:hover{
            background:#000;
        }
    </style>
</head>

<body>

<div class="box">

    <div class="check">✔</div>

    <h2>Đặt hàng thành công!</h2>

    <p th:text="${success}">Cảm ơn bạn đã mua hàng</p>

    <a href="/user" class="btn-home">
        ⬅ Về trang chủ
    </a>

</div>

</body>
</html>
