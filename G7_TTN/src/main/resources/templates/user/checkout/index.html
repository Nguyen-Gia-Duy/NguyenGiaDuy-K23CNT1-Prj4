<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            font-family:Arial;
        }

        .container-box{
            max-width:1100px;
            margin:50px auto;
        }

        .box{
            background:#fff;
            border-radius:20px;
            padding:25px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        table th{
            background:#111;
            color:#fff;
        }

        .total{
            font-size:22px;
            font-weight:700;
            color:#dc3545;
        }

        input,select{
            margin-top:10px;
            padding:12px;
            border-radius:10px;
        }

        .btn-order{
            background:#dc3545;
            color:#fff;
            padding:12px;
            border:none;
            border-radius:30px;
            font-weight:600;
            margin-top:15px;
        }

        .btn-order:hover{
            background:#b02a37;
        }

    </style>
</head>

<body>

<div class="container container-box">

    <h2 class="mb-4">🧾 Thanh toán đơn hàng</h2>

    <div class="row g-4">

        <!-- LEFT -->
        <div class="col-lg-8">

            <div class="box">

                <table class="table table-bordered">

                    <tr>
                        <th>Sản phẩm</th>
                        <th>SL</th>
                        <th>Giá</th>
                    </tr>

                    <tr th:each="item : ${items}">
                        <td th:text="${item.product.name}"></td>
                        <td th:text="${item.qty}"></td>
                        <td th:text="${item.price}"></td>
                    </tr>

                </table>

                <div class="total mt-3">
                    Tổng tiền: <span th:text="${total}"></span> ₫
                </div>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="col-lg-4">

            <div class="box">

                <form th:action="@{/checkout/place-order}" method="post">

                    <input class="form-control"
                           name="receiverName"
                           placeholder="Tên người nhận">

                    <input class="form-control"
                           name="phone"
                           placeholder="SĐT">

                    <input class="form-control"
                           name="address"
                           placeholder="Địa chỉ">

                    <select name="paymentId" class="form-control">
                        <option th:each="p : ${payments}"
                                th:value="${p.id}"
                                th:text="${p.name}">
                        </option>
                    </select>

                    <select name="transportId" class="form-control">
                        <option th:each="t : ${transports}"
                                th:value="${t.id}"
                                th:text="${t.name}">
                        </option>
                    </select>

                    <button class="btn-order w-100">
                        Đặt hàng
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
