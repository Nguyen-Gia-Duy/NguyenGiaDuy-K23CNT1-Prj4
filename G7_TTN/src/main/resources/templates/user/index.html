<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Trang chủ | Thời Trang Nam</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f5f5f5; }
        .navbar { background: #111; }
        .navbar-brand { font-weight: 600; color: #fff !important; }
        .nav-link { color: #ddd !important; }
        .nav-link:hover { color: #fff !important; }
        .hero {
            background: url('https://images.unsplash.com/photo-1516826957135-700dedea698c') center/cover;
            height: 400px; display: flex; align-items: center;
            color: white; padding-left: 50px;
        }
        .hero h1 { font-size: 50px; font-weight: bold; }
        .product-card { transition: 0.3s; border-radius: 15px; }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .price { color: red; font-weight: bold; }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand" href="/user">G7 Fashion</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="nav" class="collapse navbar-collapse">

            <!-- LEFT -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/user">Trang chủ</a>
                </li>

                <!-- DANH MỤC -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="/products" data-bs-toggle="dropdown">
                        Danh mục Sản phẩm
                    </a>

                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/products">Tất cả</a></li>

                        <li th:each="c : ${categories}">
                            <a class="dropdown-item"
                               th:href="@{'/products?category=' + ${c.id}}"
                               th:text="${c.name}">
                            </a>
                        </li>
                    </ul>
                </li>

                <!-- ADMIN -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a href="/admin" class="nav-link text-warning">⚙ Admin</a>
                </li>
            </ul>

            <!-- RIGHT -->
            <ul class="navbar-nav align-items-center">

                <!-- USER NAME -->
                <li class="nav-item me-2" sec:authorize="isAuthenticated()">
                    <span class="text-white">
                        👋 <span sec:authentication="name"></span>
                    </span>
                </li>

                <!-- CART (CHỈ HIỆN KHI LOGIN) -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a href="/cart" class="nav-link text-white">🛒</a>
                </li>

                <!-- LOGIN -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a href="/login" class="btn btn-outline-light btn-sm ms-2">Đăng nhập</a>
                </li>

                <!-- LOGOUT -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a href="/logout" class="btn btn-danger btn-sm ms-2">Đăng xuất</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>Thời Trang Nam</h1>
        <p>Phong cách - Đẳng cấp - Hiện đại</p>
        <a href="/products" class="btn btn-light mt-3">Mua ngay</a>
    </div>
</div>

<!-- SẢN PHẨM -->
<div class="container mt-5">
    <h3 class="mb-4">🔥 Sản phẩm nổi bật</h3>

    <div class="row">
        <div class="col-md-3 col-sm-6 mb-4" th:each="p : ${products}">
            <div class="card product-card">
                <img th:src="@{'/images/' + ${p.image}}" class="card-img-top" style="height:250px; object-fit:cover;">

                <div class="card-body text-center">
                    <h6 th:text="${p.name}"></h6>

                    <p class="price"
                       th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                    </p>

                    <a th:href="@{'/product/' + ${p.id}}" class="btn btn-dark btn-sm">Xem chi tiết</a>

                    <!-- ADD CART CHỈ KHI LOGIN -->
                    <a th:href="@{'/cart/add/' + ${p.id}}"
                       class="btn btn-outline-danger btn-sm"
                       sec:authorize="isAuthenticated()">Thêm</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
