<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm | G7 Fashion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f6f6f6; }
        .navbar { background: #111; }
        .nav-link { color: #ddd !important; }
        .nav-link:hover { color: #fff !important; }

        .filter-box {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
        }

        .active-category {
            color: red !important;
            font-weight: bold;
        }

        .product-card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .price { color: red; font-weight: 600; }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/user">G7 Fashion</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li><a href="/user" class="nav-link">Trang chủ</a></li>
                <li><a href="/products" class="nav-link active">Sản phẩm</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">
    <div class="row">

        <!-- DANH MỤC -->
        <div class="col-md-3">
            <div class="filter-box">

                <h5>Danh mục</h5>

                <a href="/products"
                   th:classappend="${selectedCategory == null} ? 'active-category' : ''">
                    Tất cả
                </a>

                <div th:each="c : ${categories}">
                    <a th:href="@{'/products?category=' + ${c.id}}"
                       th:text="${c.name}"
                       th:classappend="${selectedCategory == c.id} ? 'active-category' : ''">
                    </a>
                </div>
            </div>
        </div>

        <!-- SẢN PHẨM -->
        <div class="col-md-9">
            <div class="row">

                <div class="col-md-4 mb-4" th:each="p : ${products}">
                    <div class="card product-card">

                        <img th:src="@{'/images/' + ${p.image}}" style="height:250px; object-fit:cover;">

                        <div class="card-body text-center">
                            <h6 th:text="${p.name}"></h6>

                            <p class="price"
                               th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                            </p>

                            <a th:href="@{'/product/' + ${p.id}}"
                               class="btn btn-dark btn-sm">Xem</a>

                            <a th:href="@{'/cart/add/' + ${p.id}}"
                               class="btn btn-danger btn-sm">+ Giỏ</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
