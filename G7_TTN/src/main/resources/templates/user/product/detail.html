<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <meta charset="UTF-8">
    <title th:text="${product.name} + ' | G7 Fashion'"></title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- ICON -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#f4f6f9;
        }

        a{
            text-decoration:none;
        }

        /* ================= NAVBAR ================= */

        .navbar{
            background:#111;
            padding:14px 0;
        }

        .navbar-brand{
            font-size:28px;
            font-weight:700;
            color:#fff !important;
        }

        .nav-link{
            color:#ddd !important;
            font-weight:500;
        }

        .nav-link:hover{
            color:#fff !important;
        }

        /* ================= PRODUCT WRAPPER ================= */

        .product-wrapper{
            background:#fff;
            border-radius:25px;
            padding:35px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        /* ================= IMAGE ================= */

        .main-image{
            width:100%;
            height:600px;
            object-fit:cover;
            border-radius:20px;
        }

        /* ================= PRICE ================= */

        .price{
            font-size:38px;
            font-weight:700;
            color:#e30019;
        }

        .old-price{
            font-size:20px;
            color:#888;
            text-decoration:line-through;
        }

        /* ================= INFO ================= */

        .info-card{
            background:#fafafa;
            padding:20px;
            border-radius:15px;
            margin-top:20px;
        }

        .info-item{
            display:flex;
            justify-content:space-between;
            padding:10px 0;
            border-bottom:1px dashed #ddd;
        }

        /* ================= SIZE + COLOR ================= */

        .size-btn,
        .color-btn{
            border:1px solid #ddd;
            background:#fff;
            padding:10px 15px;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        .size-btn:hover,
        .color-btn:hover{
            background:#111;
            color:#fff;
        }

        .active{
            background:#111 !important;
            color:#fff !important;
        }

        /* ================= BUTTON ================= */

        .btn-cart{
            background:#e30019;
            color:#fff;
            border:none;
            padding:14px 25px;
            border-radius:30px;
            font-weight:600;
        }

        .btn-cart:hover{
            background:#b80014;
        }

        .btn-buy{
            background:#111;
            color:#fff;
            border:none;
            padding:14px 25px;
            border-radius:30px;
            font-weight:600;
        }

        .qty-input{
            width:120px;
            padding:10px;
            border-radius:10px;
        }

    </style>

</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">

    <div class="container">

        <a class="navbar-brand" href="/user">
            🛍 G7 TTN
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarContent">

            <!-- LEFT MENU -->
            <ul class="navbar-nav ms-4">

                <li class="nav-item">
                    <a class="nav-link active" href="/user">
                        Trang chủ
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/products">
                        Sản phẩm
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-warning fw-bold" href="/sale">
                        Sale
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/advertisement">
                        Quảng cáo
                    </a>
                </li>

            </ul>

            <!-- SEARCH -->
            <form class="d-flex mx-auto search-box"
                  action="/products"
                  method="get">

                <input type="search"
                       class="form-control rounded-pill me-2"
                       placeholder="Tìm sản phẩm..."
                       name="keyword">

                <button class="btn btn-light rounded-pill">
                    <i class="bi bi-search"></i>
                </button>

            </form>

            <!-- RIGHT -->
            <ul class="navbar-nav align-items-center">

                <li class="nav-item"
                    sec:authorize="!isAuthenticated()">

                    <a href="/login"
                       class="btn btn-outline-light rounded-pill px-4">

                        Đăng nhập

                    </a>

                </li>

                <li class="nav-item dropdown"
                    sec:authorize="isAuthenticated()">

                    <a class="nav-link dropdown-toggle text-white"
                       href="#"
                       data-bs-toggle="dropdown">

                        Xin chao, <span sec:authentication="name"></span>

                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">

                        <li>
                            <a class="dropdown-item" href="/profile">
                                <i class="bi bi-person-circle me-2"></i>
                                Thông tin cá nhân
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="/orders">
                                <i class="bi bi-bag-check me-2"></i>
                                Đơn hàng
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="/cart">
                                <i class="bi bi-cart3 me-2"></i>
                                Giỏ hàng
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <a class="dropdown-item text-danger" href="/logout">
                                <i class="bi bi-box-arrow-right me-2"></i>
                                Đăng xuất
                            </a>
                        </li>

                    </ul>

                </li>

                <li class="nav-item ms-3"
                    sec:authorize="isAuthenticated()">

                    <a href="/cart"
                       class="btn btn-danger rounded-pill position-relative navbar-icon-btn">

                        <i class="bi bi-cart3"></i>

                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark">
                            0
                        </span>

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ================= CONTENT ================= -->
<div class="container mt-4">

    <div class="product-wrapper">

        <div class="row g-4">

            <!-- IMAGE -->
            <div class="col-lg-6">

                <img th:src="@{/uploads/{img}(img=${product.image})}"
                     class="main-image"
                     th:alt="${product.name}">

            </div>

            <!-- INFO -->
            <div class="col-lg-6">

                <h2 th:text="${product.name}"></h2>

                <!-- PRICE -->
                <div class="mt-3">

                    <div th:if="${product.sale == null}"
                         class="price"
                         th:text="${product.price} + ' VNĐ'">
                    </div>

                    <div th:if="${product.sale != null}">

                        <div class="old-price"
                             th:text="${product.price} + ' VNĐ'"></div>

                        <div class="price"
                             th:text="${product.price - (product.price * product.sale.discountpercent / 100)} + ' VNĐ'"></div>

                    </div>

                </div>

                <!-- INFO -->
                <div class="info-card">

                    <div class="info-item">
                        <strong>Danh mục</strong>
                        <span th:text="${product.category.name}"></span>
                    </div>

                    <div class="info-item">
                        <strong>Thương hiệu</strong>
                        <span th:text="${product.brand}"></span>
                    </div>

                    <div class="info-item">
                        <strong>Chất liệu</strong>
                        <span th:text="${product.material}"></span>
                    </div>

                </div>

                <!-- SIZE -->
                <div class="mt-4">

                    <h5>Chọn Size</h5>

                    <div class="d-flex gap-2 flex-wrap">

                        <button type="button"
                                class="size-btn"
                                th:each="s : ${sizes}"
                                th:text="${s.name}"
                                th:attr="data-id=${s.id}">
                        </button>

                    </div>

                </div>

                <!-- COLOR -->
                <div class="mt-3">

                    <h5>Màu sắc</h5>

                    <div class="d-flex gap-2 flex-wrap">

                        <button type="button"
                                class="color-btn"
                                th:each="c : ${colors}"
                                th:text="${c.name}"
                                th:attr="data-id=${c.id}">
                        </button>

                    </div>

                </div>

                <!-- QTY -->
                <div class="mt-3">

                    <h5>Số lượng</h5>

                    <input type="number"
                           id="qty"
                           class="form-control qty-input"
                           value="1"
                           min="1">

                </div>

                <!-- ADD TO CART -->
                <form th:action="@{'/cart/add/' + ${product.id}}" method="get" class="mt-4">

                    <input type="hidden" name="sizeId" id="sizeId">
                    <input type="hidden" name="colorId" id="colorId">
                    <input type="hidden" name="qty" id="qtyInput">

                    <button type="submit" class="btn-cart">
                        🛒 Thêm vào giỏ
                    </button>

                    <a href="/checkout" class="btn-buy ms-2">
                        ⚡ Mua ngay
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- ================= SCRIPT ================= -->
<script>

    document.querySelectorAll(".size-btn").forEach(btn => {
        btn.onclick = function () {

            document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));

            this.classList.add("active");

            document.getElementById("sizeId").value = this.dataset.id;
        }
    });

    document.querySelectorAll(".color-btn").forEach(btn => {
        btn.onclick = function () {

            document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("active"));

            this.classList.add("active");

            document.getElementById("colorId").value = this.dataset.id;
        }
    });

    document.querySelector("form").addEventListener("submit", function () {
        document.getElementById("qtyInput").value =
            document.getElementById("qty").value;
    });

</script>

</body>
</html>
