<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="row">
        <!-- IMAGE -->
        <div class="col-md-6">
            <img th:src="${p.image}" class="img-fluid">
        </div>

        <!-- INFO -->
        <div class="col-md-6">
            <h2 th:text="${p.name}"></h2>

            <h4 style="color:red;" th:text="${p.price} + ' VNĐ'"></h4>

            <p th:text="${p.description}"></p>

            <p><b>Thương hiệu:</b> <span th:text="${p.brand}"></span></p>
            <p><b>Chất liệu:</b> <span th:text="${p.material}"></span></p>

            <button class="btn btn-dark">🛒 Thêm vào giỏ</button>
        </div>
    </div>

</div>

</body>
</html>
