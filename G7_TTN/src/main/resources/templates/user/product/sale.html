<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>SALE | G7 Fashion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .product-card{
            border:none;
            border-radius:15px;
            overflow:hidden;
            transition:0.3s;
        }

        .product-card:hover{
            transform:translateY(-10px);
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        .product-img{
            height:260px;
            object-fit:cover;
        }

        .old-price{
            text-decoration:line-through;
            color:gray;
        }

        .new-price{
            color:red;
            font-size:22px;
            font-weight:bold;
        }

        .sale-badge{
            position:absolute;
            top:10px;
            left:10px;
            background:red;
            color:#fff;
            padding:5px 10px;
            border-radius:10px;
            font-size:13px;
        }

    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">
        🔥 Sản phẩm SALE
    </h2>

    <div class="row">

        <div class="col-md-3 mb-4"
             th:each="p : ${products}">

            <div class="card product-card position-relative">

                <!-- BADGE -->
                <div class="sale-badge">
                    -
                    <span th:text="${p.sale.discountpercent}">
                    </span>%
                </div>

                <!-- IMAGE -->
                <img th:src="@{'/images/' + ${p.image}}"
                     class="card-img-top product-img">

                <div class="card-body text-center">

                    <!-- NAME -->
                    <h6 th:text="${p.name}">
                    </h6>

                    <!-- OLD PRICE -->
                    <div class="old-price">

                        <span th:text="${#numbers.formatDecimal(
                            p.price,
                            0,
                            'COMMA',
                            0,
                            'POINT')}">
                        </span>

                        VNĐ

                    </div>

                    <!-- NEW PRICE -->
                    <div class="new-price">

                        <span th:text="${#numbers.formatDecimal(
                        p.price - (p.price * p.sale.discountpercent / 100),
                        0,
                        'COMMA',
                        0,
                        'POINT')}">
                        </span>

                        VNĐ

                    </div>

                    <div class="mt-3">

                        <a th:href="@{'/product/' + ${p.id}}"
                           class="btn btn-dark btn-sm">

                            Xem
                        </a>

                        <a th:href="@{'/cart/add/' + ${p.id}}"
                           class="btn btn-danger btn-sm">

                            Thêm
                        </a>

                    </div>

                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
