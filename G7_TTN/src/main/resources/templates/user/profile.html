<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile | G7 Fashion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background: #eef2f7;
        }

        /* ================= NAVBAR ================= */
        .navbar {
            background: #0f172a;
        }

        .navbar-brand {
            font-weight: 700;
            color: #fff !important;
        }

        /* ================= LAYOUT ================= */
        .profile-wrapper {
            padding: 60px 0;
        }

        .profile-card {
            background: #fff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        }

        /* LEFT */
        .profile-left {
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color: #fff;
            padding: 50px 30px;
            text-align: center;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            margin: auto;
            border: 5px solid rgba(255,255,255,0.2);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            margin-top: 20px;
            font-size: 22px;
            font-weight: 700;
        }

        .role {
            font-size: 14px;
            color: #cbd5e1;
        }

        .info {
            margin-top: 30px;
            text-align: left;
        }

        .info p {
            margin-bottom: 10px;
            font-size: 14px;
        }

        /* RIGHT */
        .profile-right {
            padding: 40px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 25px;
        }

        .form-control {
            height: 48px;
            border-radius: 12px;
        }

        textarea.form-control {
            height: 110px;
        }

        .btn-save {
            background: #0f172a;
            color: #fff;
            border-radius: 12px;
            height: 50px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-save:hover {
            background: #2563eb;
        }

        .btn-change {
            background: #111827;
            color: #fff;
            border-radius: 12px;
            height: 50px;
            font-weight: 600;
            margin-top: 15px;
            display: block;
            text-align: center;
            line-height: 50px;
        }

        .btn-change:hover {
            background: #1d4ed8;
            color: #fff;
        }

        .alert {
            border-radius: 12px;
        }

    </style>

</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">

        <a class="navbar-brand" href="/user">🛍 G7 TTN</a>

        <div class="ms-auto">
            <a href="/cart" class="btn btn-danger rounded-pill">
                <i class="fa fa-cart-shopping"></i>
            </a>
        </div>

    </div>
</nav>

<!-- ================= PROFILE ================= -->
<section class="profile-wrapper">

    <div class="container">

        <div class="profile-card">

            <div class="row g-0">

                <!-- LEFT -->
                <div class="col-lg-4 profile-left">

                    <div class="avatar">
                        <img th:src="${user.avatar != null && !#strings.isEmpty(user.avatar)}
                            ? @{/uploads/{img}(img=${user.avatar})}
                            : @{/images/default-avatar.png}">
                    </div>

                    <div class="name" th:text="${user.name}"></div>

                    <div class="role">Member G7 Fashion</div>

                    <div class="info mt-4">

                        <p><i class="fa fa-envelope me-2"></i> <span th:text="${user.email}"></span></p>
                        <p><i class="fa fa-phone me-2"></i> <span th:text="${user.phone}"></span></p>
                        <p><i class="fa fa-location-dot me-2"></i> <span th:text="${user.address}"></span></p>
                        <p><i class="fa fa-user me-2"></i> <span th:text="${user.username}"></span></p>

                    </div>

                </div>

                <!-- RIGHT -->
                <div class="col-lg-8 profile-right">

                    <div class="title">Hồ sơ cá nhân</div>
                    <div class="subtitle">Cập nhật thông tin tài khoản của bạn</div>

                    <!-- SUCCESS -->
                    <div th:if="${param.success}" class="alert alert-success">
                        ✔ Cập nhật thành công
                    </div>

                    <!-- FORM UPDATE -->
                    <form action="/profile/update"
                          method="post"
                          enctype="multipart/form-data">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label>Họ tên</label>
                                <input name="name" class="form-control" th:value="${user.name}">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Username</label>
                                <input class="form-control" th:value="${user.username}" readonly>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Email</label>
                                <input name="email" class="form-control" th:value="${user.email}">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Số điện thoại</label>
                                <input name="phone" class="form-control" th:value="${user.phone}">
                            </div>

                            <div class="col-12 mb-3">
                                <label>Avatar</label>
                                <input type="file" name="avatarFile" class="form-control">
                            </div>

                            <div class="col-12 mb-3">
                                <label>Địa chỉ</label>
                                <textarea name="address" class="form-control"
                                          th:text="${user.address}"></textarea>
                            </div>

                            <div class="col-12">
                                <button class="btn btn-save w-100">
                                    💾 Lưu thay đổi
                                </button>
                            </div>

                        </div>

                    </form>

                    <!-- CHANGE PASSWORD -->
                    <a href="/change-password" class="btn-change">
                        🔑 Đổi mật khẩu
                    </a>

                </div>

            </div>

        </div>

    </div>

</section>

</body>
</html>
